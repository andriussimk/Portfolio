<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
  <meta http-equiv="refresh" content="0; url=/adminPanel/">
  <link rel="canonical" href="/adminPanel/">
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to <a href="/adminPanel/">/adminPanel/</a>…</p>
    <script>
      // Compatibility shim only.
      location.replace('/adminPanel/');
    </script>
  </body>
</html>

      <div class="statusbar">
        <div id="status" class="status">Ready.</div>
        <button class="btn small" id="refresh-btn" type="button">Refresh</button>
      </div>

      <h2>Auth</h2>
      <div class="field">
        <div class="label">Admin token</div>
        <div class="token-row">
          <input class="input" id="token-input" type="password" placeholder="Bearer token" autocomplete="off" />
          <button class="btn small" id="token-save" type="button">Save</button>
          <button class="btn small" id="token-clear" type="button">Clear</button>
        </div>
        <div class="muted" style="font-size:12px; margin-top:6px;">Stored in this browser’s localStorage and sent as <code>Authorization: Bearer ...</code>.</div>
      </div>

      <h2>Create gallery</h2>
      <form id="create-form" style="display:grid; gap:10px;">
        <div class="field">
          <div class="label">Title</div>
          <input class="input" id="title" placeholder="Concerts" required />
        </div>
        <div class="field">
          <div class="label">Slug (id)</div>
          <input class="input" id="slug" placeholder="concerts" required />
        </div>
        <button class="btn primary" type="submit" id="create-btn">Create</button>
      </form>

      <h2>Galleries</h2>
      <div class="list" id="gallery-list"></div>
    </aside>

    <section class="panel">
      <div class="topbar" style="margin-bottom: 8px;">
        <div>
          <h1 style="margin:0;" id="selected-title">Select a gallery</h1>
          <div class="muted" style="font-size:12px; margin-top:2px;" id="selected-subtitle">Pick one from the left to manage photos</div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <div class="toggle" id="visibility-wrap" style="display:none;">
            <div style="text-align:right;">
              <div class="toggle-label">Visible</div>
              <div class="muted" style="font-size:12px;">Toggle to hide/show</div>
            </div>
            <label class="switch" aria-label="Toggle visibility">
              <input id="visibility-switch" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <button class="btn danger" id="delete-gallery-btn" type="button" style="display:none;">Delete</button>
        </div>
      </div>

      <input id="photo-gallery-id" type="hidden" value="" />

      <div id="photo-manager" style="display:none;">
        <h2 style="margin-top: 8px;">Upload</h2>
        <form id="photo-upload-form" style="display:grid; gap:10px;">
          <div class="grid-2">
            <div class="field">
              <div class="label">Photos</div>
              <input class="input" id="photo-files" type="file" accept="image/*" multiple />
            </div>
            <div class="field">
              <div class="label">Options</div>
              <label style="display:flex; gap:10px; align-items:center; padding:10px 12px; border:1px solid var(--panel-border); border-radius:12px; background: color-mix(in srgb, var(--bg) 70%, transparent);">
                <input id="make-cover" type="checkbox" />
                <span style="font-size:13px;">If no cover exists, first upload becomes <code>cover.jpg</code></span>
              </label>
            </div>
          </div>
          <button class="btn primary" type="submit" id="upload-btn">Upload</button>
        </form>

        <h2>Photos</h2>
        <div id="photo-list" class="photo-grid"></div>
      </div>
    </section>
  </div>
  <script type="module" src="/src/admin-panel.ts"></script>
</body>
</html>
